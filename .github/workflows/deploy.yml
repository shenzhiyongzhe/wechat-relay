name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build → Upload → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true  # 不推送到仓库，而是加载到本地准备打包
          tags: wechat-relay:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Save Docker image to tarball
        run: docker save wechat-relay:latest | gzip > wechat-relay-image.tar.gz

      - name: Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          # 上传构建好的镜像包、docker-compose 和 nginx 配置文件
          source: "wechat-relay-image.tar.gz,docker-compose.yml,nginx.conf"
          target: "/opt/wechat-relay"
          overwrite: true

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/wechat-relay

            # 导入上传的本地镜像文件
            echo "Loading Docker image from tarball..."
            docker load -i wechat-relay-image.tar.gz

            # 启动容器（使用刚刚加载的 latest 镜像）
            docker compose up -d --remove-orphans

            # 检查健康状态并清理旧文件
            sleep 5
            docker compose ps
            docker image prune -f
            rm -f wechat-relay-image.tar.gz

            echo "✅ Deployment complete!"
