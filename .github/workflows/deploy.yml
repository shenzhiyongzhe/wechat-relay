name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wechat-relay

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Docker Buildx (layer cache support) ───────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Login to Docker Hub ───────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Build & Push (with GitHub Actions cache) ──────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # GitHub Actions cache for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Deploy to server via SSH ───────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/wechat-relay

            # Pull the new image
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env

            docker compose pull app
            docker compose up -d --remove-orphans

            # Wait for healthy status
            echo "Waiting for app to be healthy..."
            sleep 10
            docker compose ps

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete! SHA: ${{ github.sha }}"
